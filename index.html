<!DOCTYPE html>
<html lang="az">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Life OS - Fuad.B</title>

    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#121212">
    <link rel="icon" type="image/png" href="favicon.png">
    <link rel="apple-touch-icon" href="icon-192.png">

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>

<body data-theme="dark">

    <canvas id="confetti-canvas"></canvas>
    <div class="sidebar-overlay" id="sidebar-overlay" onclick="toggleSidebar()"></div>

    <div class="sidebar" id="sidebar">
        <div class="app-header">
            <div class="app-title">Life OS</div>
            <button class="icon-btn" id="theme-btn" onclick="QuizApp.toggleTheme()">☀️</button>
        </div>

        <!-- Firebase Auth Section -->
        <div class="auth-section">
            <button id="login-btn" class="login-google-btn" onclick="FirebaseSync.signIn()">
                <svg width="18" height="18" viewBox="0 0 24 24">
                    <path fill="#EA4335" d="M12 5.04c1.66 0 3.2.57 4.38 1.69l3.27-3.27C17.67 1.48 14.99 0 12 0 7.35 0 3.37 2.67 1.46 6.55l3.87 3C6.24 7.26 8.92 5.04 12 5.04z"/>
                    <path fill="#4285F4" d="M23.49 12.27c0-.81-.07-1.62-.22-2.4H12v4.56h6.46c-.28 1.48-1.12 2.74-2.38 3.58l3.7 2.87c2.16-1.99 3.71-4.92 3.71-8.61z"/>
                    <path fill="#FBBC05" d="M5.33 14.45A7.16 7.16 0 0 1 5 12c0-.85.15-1.68.42-2.45L1.55 6.55A11.96 11.96 0 0 0 0 12c0 1.99.49 3.88 1.37 5.55l3.96-3.1z"/>
                    <path fill="#34A853" d="M12 24c3.24 0 5.97-1.07 7.96-2.91l-3.7-2.87c-1.03.69-2.34 1.1-3.96 1.1-3.08 0-5.76-2.22-6.67-5.51L1.13 16.9A11.96 11.96 0 0 0 12 24z"/>
                </svg>
                Google ilə Giriş
            </button>
            <div id="user-info" class="user-info-box" style="display:none;"></div>
            <div class="sync-status-container">
                <span id="sync-status" class="sync-status-badge local">
                    <span class="dot"></span>
                    <span>Lokal</span>
                </span>
            </div>
        </div>

        <!-- App Search? Maybe global search later -->
        <!-- <div class="search-box">
        <span style="opacity:0.5; margin-right:5px;">🔍</span>
        <input type="text" class="search-input" placeholder="Axtarış..." onkeypress="handleSearch(event)">
    </div> -->

        <div class="daily-box">
            <div style="display:flex; justify-content:space-between; font-size:0.75rem; color:var(--text-muted);">
                <span>GÜNLÜK HƏDƏF</span><span id="daily-text">0/50</span>
            </div>
            <div class="daily-track">
                <div class="daily-fill" id="daily-bar"></div>
            </div>
        </div>

        <!-- Sidebar Custom Stopwatch Tool -->
        <div class="sidebar-timer-box">
            <div class="timer-header">
                <span class="timer-title">⏱️ XRONOMETR</span>
                <span class="timer-display" id="sb-timer-display">00:00:00</span>
            </div>
            <div class="timer-controls">
                <button class="timer-btn" id="sb-timer-start" onclick="SidebarTimer.toggle()">Başla</button>
                <button class="timer-btn reset" id="sb-timer-reset" onclick="SidebarTimer.reset()">Sıfırla</button>
            </div>
        </div>

        <div class="course-list" id="sidebar-list">
            <!-- Main.js will render App Switcher and Sub-menus here -->
        </div>
    </div>

    <div class="main">
        <div class="mobile-header">
            <button onclick="toggleSidebar()"
                style="background:none; border:none; color:var(--text-main); font-size:1.5rem;">☰</button>
            <span style="font-weight:700;">Life OS</span>
            <div style="width:24px;"></div>
        </div>

        <div class="top-nav" id="top-nav" style="display:none;"></div>
        <div class="content-area" id="content-area">
            <!-- Dynamic Content -->
        </div>
    </div>

    <template id="quiz-template">
        <div class="card">
            <div class="card-header-section">
                <div id="subject-nav"
                    style="display:flex; gap:10px; overflow-x:auto; margin-bottom:15px; padding-bottom:5px; scrollbar-width:none;">
                </div>

                <div class="quiz-header">
                    <div class="quiz-info">
                        <div style="display:flex; align-items:center; gap:8px;">
                            <button class="btn-back-to-db" onclick="QuizApp.showCourseDashboard(QuizApp.state.course)" title="Fənn Dashboard-una qayıt" style="background:none; border:none; color:var(--text-muted); font-size:1.2rem; cursor:pointer; padding:0 4px; display:flex; align-items:center; transition:color 0.2s;">&larr;</button>
                            <span id="course-name-sm" style="margin:0;">...</span>
                        </div>
                        <h2 id="title-unit" style="margin-top:5px;">Yüklənir...</h2>
                    </div>

                    <div class="header-right">
                        <div class="score-group">
                            <div class="score-box timer" id="quiz-timer-disp">00:00</div>
                            <div class="score-box wrong" id="score-wrong-disp">0</div>
                            <div class="score-box correct" id="score-correct-disp">0</div>
                        </div>

                        <div class="quiz-actions">
                            <div class="action-icon" id="btn-star" onclick="toggleBookmark()">★</div>
                            <div class="action-icon" id="btn-speak" onclick="speakQuestion()">🔊</div>
                            <div class="action-icon" id="btn-flash" onclick="toggleFlashcard()">👁️</div>
                        </div>
                    </div>
                </div>

                <div class="progress-track" id="progress-bar"></div>
            </div>

            <div class="question-box">
                <div id="q-meta" style="font-size: 0.82rem; color: var(--text-muted); font-weight: 600; margin-bottom: 12px; display: none; align-items: center; gap: 8px;"></div>
                <div class="question-text" id="q-text">...</div>
                <div id="flashcard-cover"
                    style="text-align:center; padding:40px; border:2px dashed var(--border); border-radius:12px; margin-bottom:20px; display:none;"
                    onclick="revealFlashcard()">
                    <h3>🃏 Toxun və Gör</h3>
                </div>
                <div id="opt-list"></div>
            </div>

            <div class="controls">
                <button class="btn btn-sec" id="btn-prev" onclick="nav(-1)"> Geri</button>
                <button class="btn btn-sec icon-only" onclick="resetUnit()">Sıfırla</button>
                <button class="btn btn-sec icon-only" id="btn-hint" onclick="hint()">İpucu</button>
                <button class="btn btn-pri" id="btn-next" onclick="nav(1)">Növbəti</button>
            </div>
        </div>
    </template>

    <template id="stats-template">
        <div class="card" style="min-height:auto;">
            <h2 style="margin-bottom:20px;">📊 Statistika</h2>
            <div class="stat-grid">
                <div class="stat-card" onclick="showStatDetails('total')">
                    <div class="stat-lbl">Sual</div>
                    <div class="stat-val" id="st-total">0</div>
                </div>
                <div class="stat-card" onclick="showStatDetails('time')">
                    <div class="stat-lbl">Vaxt</div>
                    <div class="stat-val" id="st-time">0s</div>
                </div>
                <div class="stat-card" onclick="showStatDetails('correct')">
                    <div class="stat-lbl">Düz</div>
                    <div class="stat-val" id="st-correct" style="color:var(--active)">0</div>
                </div>
                <div class="stat-card" onclick="showStatDetails('accuracy')">
                    <div class="stat-lbl">Faiz</div>
                    <div class="stat-val" id="st-accuracy">-</div>
                </div>
            </div>
            <h3 style="font-size:1rem; margin-bottom:10px;">Detallar</h3>
            <div style="overflow-x:auto;">
                <table class="stat-table">
                    <tbody id="stat-table-body"></tbody>
                </table>
            </div>
            <button class="btn btn-sec"
                style="margin-top:20px; width:100%; color:var(--wrong); border-color:var(--wrong);"
                onclick="resetStatistics()">Sıfırla</button>
        </div>
    </template>

    <template id="wrong-menu-template">
        <div class="card" style="min-height:auto;">
            <h2 style="margin-bottom:20px;">❌ Səhvlər</h2>
            <div class="stat-grid" id="wrong-grid"></div>
        </div>
    </template>

    <template id="course-dashboard-template">
        <div class="dashboard-full-container">
            <div class="dashboard-header" style="margin-bottom:25px; display:flex; align-items:flex-start; gap:15px;">
                <button onclick="if(document.getElementById('btn-home')) document.getElementById('btn-home').click(); else window.location.reload();" style="background:var(--bg-element); border:1px solid var(--border); color:var(--text-main); border-radius:12px; padding:8px 16px; cursor:pointer; font-size:1.2rem; display:flex; align-items:center; justify-content:center; transition:0.2s;" onmouseover="this.style.background='var(--bg-element-hover)'" onmouseout="this.style.background='var(--bg-element)'">←</button>
                <div>
                    <h2 id="db-course-title" style="margin-top:0; margin-bottom:5px; font-size: 1.5rem;">Fənn Adı</h2>
                    <span style="font-size:0.9rem; color:var(--text-muted);">Fənn üzrə göstəricilər, tövsiyələr və bölmələr</span>
                </div>
            </div>
            
            <div class="dashboard-two-col">
                <!-- Left Column: Statistics & AI Recommendation -->
                <div class="dashboard-col-left">

                    <div class="dashboard-stats-grid">
                        <div class="db-stat-card">
                            <div class="db-stat-lbl">Cəmi Sual</div>
                            <div class="db-stat-val" id="db-total-questions">0</div>
                        </div>
                        <div class="db-stat-card">
                            <div class="db-stat-lbl">İşlənən Sual</div>
                            <div class="db-stat-val" id="db-total-attempts" style="color:var(--text-main)">0</div>
                        </div>
                        <div class="db-stat-card">
                            <div class="db-stat-lbl">Sərf Edilən Vaxt</div>
                            <div class="db-stat-val" id="db-total-time">0s</div>
                        </div>
                        <div class="db-stat-card">
                            <div class="db-stat-lbl">Düzgün Cavab</div>
                            <div class="db-stat-val" id="db-total-correct" style="color:var(--active)">0</div>
                        </div>
                        <div class="db-stat-card">
                            <div class="db-stat-lbl">Səhv Cavab</div>
                            <div class="db-stat-val" id="db-total-wrong" style="color:var(--wrong)">0</div>
                        </div>
                        <div class="db-stat-card">
                            <div class="db-stat-lbl">Dəqiqlik (%)</div>
                            <div class="db-stat-val" id="db-accuracy" style="color:var(--accent)">0%</div>
                        </div>
                    </div>

                    <div id="db-wrong-exam-container" style="display:none;"></div>

                    <div id="db-mixed-exam-container"></div>

                    <div class="recommendation-box" id="db-recommendation">
                        <div style="font-weight:700; font-size:0.95rem; margin-bottom:8px; color:var(--accent);">💡 AI TÖVSİYƏSİ</div>
                        <div id="db-recommendation-text" style="font-size:0.9rem; line-height:1.5; color:var(--text-main);">...</div>
                    </div>
                </div>
                
                <!-- Right Column: Units List -->
                <div class="dashboard-col-right">
                    <div class="units-header" style="display:flex; justify-content:space-between; align-items:center; margin-bottom:15px; flex-wrap:wrap; gap:10px;">
                        <h3 style="font-size:1.1rem; margin:0; font-family:'Plus Jakarta Sans', sans-serif; font-weight:700;">Bölmələr</h3>
                        <div class="layout-toggle" style="display:flex; gap:4px; background:var(--bg-element); padding:4px; border-radius:10px; border:1px solid var(--border);">
                            <button class="layout-btn active" id="layout-grid-btn" onclick="setDashboardLayout('grid')">Kart</button>
                            <button class="layout-btn" id="layout-table-btn" onclick="setDashboardLayout('table')">Cədvəl</button>
                        </div>
                    </div>
                    <div class="unit-list-container" id="db-unit-list"></div>
                </div>
            </div>
        </div>
    </template>

    <div class="modal-overlay" id="modal-overlay" onclick="if(event.target===this)closeModal()">
        <div class="modal-box">
            <div
                style="display:flex; justify-content:space-between; margin-bottom:15px; border-bottom:1px solid var(--border); padding-bottom:10px;">
                <h3 id="modal-title" style="margin:0;">Nəticə</h3>
                <button onclick="closeModal()"
                    style="background:none; border:none; color:var(--text-main); font-size:1.2rem;">✕</button>
            </div>
            <div id="modal-body"></div>
        </div>
    </div>

    <!-- Surprise Question Modal Overlay -->
    <div class="modal-overlay" id="surprise-modal-overlay" style="display:none; justify-content:center; align-items:center; z-index:2000;">
        <div class="modal-box surprise-box" style="position:relative; max-width:550px; width:90%; padding:28px; border-radius:24px; background:var(--bg-card); border:1px solid var(--border); box-shadow: 0 20px 50px rgba(0,0,0,0.5);">
            <div class="surprise-header" style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px; border-bottom:1px solid var(--border); padding-bottom:12px;">
                <div style="display:flex; align-items:center; gap:8px;">
                    <span style="font-size:1.5rem;">🎁</span>
                    <h3 style="margin:0; font-family:'Plus Jakarta Sans', sans-serif; font-weight:800; background:linear-gradient(135deg, #f59e0b 0%, #f97316 100%); -webkit-background-clip:text; background-clip:text; -webkit-text-fill-color:transparent;">Sürpriz Sual!</h3>
                </div>
                <div id="surprise-timer" style="font-family:'Plus Jakarta Sans', sans-serif; font-weight:800; font-size:1.1rem; color:#ef4444; background:rgba(239,68,68,0.1); padding:4px 10px; border-radius:8px; border:1px solid rgba(239,68,68,0.2);">30s</div>
            </div>
            <div class="surprise-content">
                <div id="surprise-meta" style="font-size:0.8rem; color:var(--text-muted); font-weight:700; text-transform:uppercase; letter-spacing:0.5px; margin-bottom:10px;"></div>
                <div id="surprise-question-text" style="font-size:1.1rem; font-weight:600; color:var(--text-main); margin-bottom:20px; line-height:1.5;"></div>
                <div id="surprise-options-list" style="display:flex; flex-direction:column; gap:10px; margin-bottom:20px;"></div>
            </div>
            <div id="surprise-feedback" style="display:none; text-align:center; font-weight:800; font-size:1.05rem; margin-bottom:20px; padding:12px; border-radius:14px; font-family:'Plus Jakarta Sans', sans-serif;"></div>
            <div class="surprise-footer" id="surprise-footer" style="display:none; justify-content:flex-end;">
                <button class="btn btn-pri" onclick="QuizApp.closeSurpriseModal()" style="width:100%; padding:12px; border-radius:12px; font-weight:700; background:var(--accent-gradient);">Davam Et</button>
            </div>
        </div>
    </div>

    <!-- SCRIPTS -->
    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
    
    <script src="data.js?v=2"></script>
    <script src="config.js"></script>
    <script src="firebase.js?v=2.3"></script>
    <script src="quiz.js"></script>
    <script src="main.js"></script>
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./sw.js')
                    .then((reg) => console.log('Service Worker qeydiyyatdan keçdi:', reg.scope))
                    .catch((err) => console.log('Service Worker qeydiyyat xətası:', err));
            });
        }
    </script>
</body>

</html>
